<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>App de Pronósticos</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>📊 App de Pronósticos</h1>

<!-- CARGAR ARCHIVO -->
<input type="file" id="fileInput">
<button onclick="uploadFile()">Cargar CSV</button>

<br><br>

<!-- PARAMETRO N -->
<label>N (Promedio móvil):</label>
<input type="number" id="nValue" value="3">
<button onclick="runForecast()">Ejecutar</button>

<!-- RESULTADOS -->
<div id="results"></div>

<!-- GRÁFICO -->
<canvas id="myChart"></canvas>

<!-- LIBRERÍA CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let chart = null;

// -----------------------------
// SUBIR ARCHIVO
// -----------------------------
function uploadFile() {
    let file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Selecciona un archivo primero");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    fetch("/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
    })
    .catch(error => {
        console.error("Error:", error);
    });
}

// -----------------------------
// EJECUTAR PRONÓSTICO
// -----------------------------
function runForecast() {
    let n = document.getElementById("nValue").value;

    fetch("/forecast", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ n: n })
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            alert(data.error);
            return;
        }

        // Mostrar métricas
        let html = `
            <h2>Resultados</h2>
            <p>MAPE: ${data.errors.MAPE}</p>
            <p>MAPE': ${data.errors.MAPE_prima}</p>
            <p>MSE: ${data.errors.MSE}</p>
            <p>MAE: ${data.errors.MAE}</p>
            <p>RMSE: ${data.errors.RMSE}</p>
        `;

        document.getElementById("results").innerHTML = html;

        // Dibujar gráfico
        drawChart(data.real, data.forecast);
    })
    .catch(error => {
        console.error("Error:", error);
    });
}

// -----------------------------
// GRAFICAR
// -----------------------------
function drawChart(real, forecast) {

    const ctx = document.getElementById("myChart").getContext("2d");

    let labels = real.map((_, i) => i + 1);
    let cleanForecast = forecast.map(v => v === "" ? null : v);

    // destruir gráfico anterior
    if (chart) {
        chart.destroy();
    }

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [
                {
                    label: "Datos históricos",
                    data: real,
                    borderWidth: 2
                },
                {
                    label: "Pronóstico (Promedio móvil)",
                    data: cleanForecast,
                    borderDash: [5, 5],
                    borderWidth: 2
                }
            ]
        }
    });
}
</script>

</body>
</html>
